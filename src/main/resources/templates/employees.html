<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Employees</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        a.btn, button.btn { padding: 6px 12px; text-decoration: none; border-radius: 4px; border: none; cursor: pointer; }
        .btn-primary { background-color: #4CAF50; color: white; }
        .btn-warning { background-color: #ff9800; color: white; }
        .btn-danger  { background-color: #f44336; color: white; }
        .search-bar { margin-bottom: 20px; }
        .search-bar input { padding: 8px; width: 250px; }
        .search-bar button { padding: 8px 14px; }
        .error-msg { color: red; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2>Employee List</h2>

    <!-- Error message -->
    <p th:if="${param.error == 'notfound'}" class="error-msg">Employee not found.</p>
    <p th:if="${phoneError}" class="error-msg" th:text="${phoneError}"></p>

    <!-- Search bar -->
    <div class="search-bar">
        <!-- <form th:action="@{/employees/search}" method="get">
            <input type="text" name="name" placeholder="Search by name"
                   th:value="${searchTerm}" />
            <button type="submit">Search Name</button>
        </form>
        <br/> -->
        <form th:action="@{/employees/search}" method="get">
            <input type="number" name="phoneno" placeholder="Search by phone"
                   th:value="${searchPhone}" />
            <button type="submit">Search Phone</button>
        </form>
        <a href="/employees/all">Clear Search</a>
    </div>

    <a class="btn btn-primary" th:href="@{/employees/add}">Add New Employee</a>
    <br/><br/>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Gender</th>
                <th>Designation</th>
                <th>Salary</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="emp : ${employees}">
                <td th:text="${emp.id}"></td>
                <td th:text="${emp.name}"></td>
                <td th:text="${emp.email}"></td>
                <td th:text="${emp.phoneno}"></td>
                <td th:text="${emp.gender}"></td>
                <td th:text="${emp.designation}"></td>
                <td th:text="${emp.salary}"></td>
                <td>
                    <a class="btn btn-warning" th:href="@{/employees/edit/{id}(id=${emp.id})}">Edit</a>
                    &nbsp;
                    <!-- DELETE via POST form to prevent CSRF / accidental deletion -->
                    <form th:action="@{/employees/delete/{id}(id=${emp.id})}" method="post"
                          style="display:inline;"
                          onsubmit="return confirm('Are you sure you want to delete this employee?')">
                        <button type="submit" class="btn btn-danger">Delete</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(employees)}">
                <td colspan="8" style="text-align:center;">No employees found.</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
